<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚘 车辆状态智能系统</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
overflow:hidden;
}

/* ===== 启动页 ===== */
#startup{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

.logo{
font-size:32px;
background:linear-gradient(45deg,#00f2ff,#ff00ea);
-webkit-background-clip:text;
color:transparent;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px #00f2ff;}
to{ text-shadow:0 0 30px #ff00ea;}
}

.loader{
width:250px;
height:6px;
background:rgba(255,255,255,0.1);
border-radius:20px;
margin-top:20px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#00f2ff,#ff00ea);
animation:load 3s forwards;
}

@keyframes load{
to{ width:100%;}
}

/* ===== 主页面 ===== */
#main{
display:none;
text-align:center;
}

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

h1{
margin-top:80px;
font-size:36px;
background:linear-gradient(45deg,#00f2ff,#ff00ea);
-webkit-background-clip:text;
color:transparent;
}

.notice{
margin:20px auto;
width:80%;
padding:12px;
background:rgba(255,255,255,0.08);
border-radius:20px;
backdrop-filter:blur(15px);
font-size:14px;
}

input{
padding:12px;
width:240px;
border-radius:30px;
border:none;
outline:none;
}

button{
padding:12px 25px;
border-radius:30px;
border:none;
background:#00f2ff;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#ff00ea;
transform:scale(1.1);
box-shadow:0 0 20px #ff00ea;
}

#result{
margin-top:30px;
display:inline-block;
padding:20px 40px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
font-size:18px;
min-width:280px;
}

.online{color:#00ff88;font-weight:bold;}
.offline{color:#ff4444;font-weight:bold;}
.warning{color:#ffaa00;font-weight:bold;}
</style>
</head>

<body>

<!-- 启动页 -->
<div id="startup">
<div class="logo">🚘 Vehicle Smart System</div>
<div class="loader">
<div class="progress"></div>
</div>
</div>

<!-- 主页面 -->
<div id="main">
<div id="particles-js"></div>

<h1>车辆状态智能查询系统</h1>

<div class="notice">
📢 公告：七月制作<br>
QQ:2928823358
</div>

<input type="text" id="car" placeholder="请输入车牌号">
<button onclick="search()">查询状态</button>

<div id="result">等待查询...</div>

<!-- 樱花树下氛围音乐 -->
<audio id="bgm" autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2023/03/13/audio_c8f6e7f7df.mp3">
</audio>

</div>

<script>
/* 启动页3秒后进入主界面 */
setTimeout(()=>{
document.getElementById("startup").style.display="none";
document.getElementById("main").style.display="block";
},3000);

/* 粒子特效 */
particlesJS("particles-js", {
particles:{
number:{value:140},
size:{value:3,random:true},
line_linked:{enable:true,color:"#00f2ff"},
move:{speed:3}
},
interactivity:{
events:{
onhover:{enable:true,mode:"repulse"},
onclick:{enable:true,mode:"push"}
}
}
});

/* 模拟数据 */
const data={
"京A12345":{status:"在线",speed:"60km/h"},
"沪B88888":{status:"离线",speed:"0km/h"},
"粤C66666":{status:"异常",speed:"--"}
};

function search(){
let car=document.getElementById("car").value.trim();
let result=document.getElementById("result");

if(!data[car]){
result.innerHTML="未查询到该车辆";
return;
}

let status=data[car].status;
let className="warning";

if(status=="在线") className="online";
if(status=="离线") className="offline";

result.innerHTML=`
<div>车辆状态：<span class="${className}">${status}</span></div>
<div>当前速度：${data[car].speed}</div>
<div>更新时间：${new Date().toLocaleString()}</div>
`;
}
</script>

</body>
</html>
