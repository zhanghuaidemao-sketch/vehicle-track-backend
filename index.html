<script>

/* 启动动画 */
setTimeout(()=>{
document.getElementById("startup").style.display="none";
document.getElementById("main").style.display="block";
},3000);

/* 星空粒子 */
particlesJS("particles-js", {
particles:{
number:{value:180},
size:{value:3,random:true},
line_linked:{enable:true,color:"#00f2ff"},
move:{speed:2}
},
interactivity:{
events:{
onhover:{enable:true,mode:"repulse"},
onclick:{enable:true,mode:"push"}
}
}
});

/* 樱花生成 */
function createSakura(){
const sakura=document.createElement("div");
sakura.className="sakura";
sakura.style.left=Math.random()*100+"vw";
sakura.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(sakura);
setTimeout(()=>{sakura.remove()},10000);
}
setInterval(createSakura,300);

/* ===== 真API查询 ===== */

async function search(){
let plate=document.getElementById("car").value.trim();
let result=document.getElementById("result");

if(!plate){
result.innerHTML="请输入车牌号";
return;
}

result.innerHTML="正在查询中...";

try{
let response = await fetch(`https://ovo1.cc/api/car.php?plate=${encodeURIComponent(plate)}`);
let data = await response.json();

console.log(data);

/* 根据返回字段自行调整 */
if(data.code == 200){

let statusClass="warning";
if(data.status == "在线") statusClass="online";
if(data.status == "离线") statusClass="offline";

result.innerHTML=`
<div>车牌号：${plate}</div>
<div>车辆状态：<span class="${statusClass}">${data.status}</span></div>
<div>所属地区：${data.area || "--"}</div>
<div>更新时间：${new Date().toLocaleString()}</div>
`;

}else{
result.innerHTML="查询失败："+ (data.msg || "未知错误");
}

}catch(error){
result.innerHTML="接口请求失败（可能跨域）";
console.error(error);
}

}

</script>
