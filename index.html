<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 利利宝宝万岁</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body{
margin:0;
background:#000;
overflow:hidden;
font-family:"Arial";
text-align:center;
color:#fff;
}

/* 粒子层 */
#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-3;
}

/* 模糊背景图 */
#bg{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
filter:blur(15px) brightness(0.4);
z-index:-2;
}

/* 主照片3D旋转 */
.photo{
margin-top:80px;
width:260px;
height:340px;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 40px pink;
animation:spin 8s linear infinite;
transform-style:preserve-3d;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes spin{
0%{transform:rotateY(0deg);}
100%{transform:rotateY(360deg);}
}

/* 公告栏 */
.notice{
margin:20px auto;
width:85%;
padding:12px;
background:rgba(255,192,203,0.2);
border-radius:25px;
backdrop-filter:blur(10px);
font-size:18px;
box-shadow:0 0 20px pink;
}

/* 标题 */
h1{
margin-top:40px;
font-size:28px;
background:linear-gradient(45deg,#ff00cc,#ff66ff);
-webkit-background-clip:text;
color:transparent;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px pink;}
to{ text-shadow:0 0 30px #ff66ff;}
}

/* 樱花 */
.sakura{
position:fixed;
top:-10px;
width:15px;
height:15px;
background:pink;
border-radius:50%;
opacity:0.8;
animation:fall linear infinite;
z-index:-1;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}
</style>
</head>

<body>

<img id="bg" src="lili.jpg">

<div id="particles-js"></div>

<h1>💖 利利专属浪漫网站 💖</h1>

<div class="notice">
🌸 公告：利利宝宝万岁 🌸
</div>

<div class="photo">
<img src="lili.jpg">
</div>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6f1b5f38d8.mp3">
</audio>

<script>

/* 粒子特效 */
particlesJS("particles-js", {
particles:{
number:{value:120},
size:{value:3,random:true},
line_linked:{enable:true,color:"#ff66ff"},
move:{speed:2}
}
});

/* 樱花雨 */
function createSakura(){
const s=document.createElement("div");
s.className="sakura";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(s);
setTimeout(()=>{s.remove()},10000);
}
setInterval(createSakura,300);

</script>

</body>
</html>
